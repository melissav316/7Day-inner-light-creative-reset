<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inner Light Reset — 7-Day Workbook · Inner Light Studio by Melissa Vermaak</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Lato:wght@300;400;700&display=swap">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --cream:#FDF9F4;
  --parchment:#F2E8D8;
  --sand:#E0CEB8;
  --terracotta:#BF6B50;
  --terra-light:#D4957A;
  --terra-pale:#F8EDE8;
  --sage:#5B8B80;
  --sage-light:#8DB5A8;
  --sage-pale:#E8F2F0;
  --deep:#2C2018;
  --warm:#6B5040;
  --mid:#8B7B6B;
  --gold:#C9A86E;
  --olive:#8B9E5E;
  --blush:#F5E4DC;
  --purple-soft:#B09EC0;
  --rainbow:linear-gradient(90deg,#4B8B7C 0%,#6B9975 18%,#9BA45E 34%,#C4B068 48%,#CDA068 58%,#C2705A 72%,#A85040 88%,#8B4535 100%);
}

html,body{height:100%;background:var(--cream)}

.workbook{display:flex;height:100vh;overflow:hidden;font-family:'Lato',sans-serif;background:var(--cream);color:var(--deep)}

/* ── SIDEBAR ─────────────────────────────── */
.sidebar{
  width:224px;min-width:224px;
  background:var(--deep);
  display:flex;flex-direction:column;
  padding:28px 0 20px;
  overflow-y:auto;z-index:100;flex-shrink:0;
  transition:transform .3s ease;
}
.sidebar-brand{padding:0 20px 24px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sidebar-brand h1{font-family:'Playfair Display',serif;font-size:14px;font-weight:400;color:#E0CEB8;line-height:1.45;font-style:italic}
.sidebar-brand p{font-size:8.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--terracotta);margin-top:6px;font-weight:400}
.sidebar-brand .rainbow-mini{height:2px;background:var(--rainbow);margin-top:14px}
.sidebar-nav{padding:16px 0;flex:1}
.nav-group-label{font-size:7.5px;letter-spacing:.25em;text-transform:uppercase;color:rgba(139,123,107,0.7);padding:0 20px;margin:14px 0 5px;font-weight:400}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 20px;cursor:pointer;
  transition:all .2s ease;
  font-size:11px;font-weight:300;letter-spacing:.02em;
  color:rgba(224,206,184,0.65);
  border-left:2px solid transparent;
  user-select:none;
}
.nav-item:hover{color:rgba(224,206,184,0.9);background:rgba(191,107,80,.07)}
.nav-item.active{color:var(--terracotta);border-left-color:var(--terracotta);background:rgba(191,107,80,.1)}
.nav-dot{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0;transition:opacity .2s}
.nav-item.active .nav-dot{opacity:1}
.sidebar-progress{padding:18px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.progress-label{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(139,123,107,0.7);margin-bottom:7px;font-weight:300}
.progress-track{height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--terracotta);border-radius:2px;transition:width .5s ease}

/* ── MAIN ────────────────────────────────── */
.main{flex:1;overflow-y:auto;min-height:0}
#page-content{animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE SHELL ──────────────────────────── */
.page{max-width:700px;margin:0 auto;padding:0 44px 100px}
.page-header{padding:40px 0 0}
.day-eyebrow{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--terracotta);font-weight:700;margin-bottom:6px}
.page-title{font-family:'Playfair Display',serif;font-size:38px;font-weight:700;font-style:italic;color:var(--terracotta);line-height:1.15;margin-bottom:14px}
.rainbow-bar{height:3px;background:var(--rainbow);margin:0 -44px;width:calc(100% + 88px);margin-bottom:28px}

/* ── TYPOGRAPHY ──────────────────────────── */
.body-text{font-size:13.5px;line-height:1.85;color:var(--warm);font-weight:300;margin-bottom:16px}
.body-text strong{color:var(--deep);font-weight:700}
.italic-text{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--warm);line-height:1.7;margin-bottom:16px}
.prompt-label{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--terracotta);margin-bottom:8px;display:block}
.section-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--terracotta);font-weight:700;margin:28px 0 12px}
.quote-box{background:var(--parchment);border-radius:10px;padding:18px 24px;font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--warm);line-height:1.75;margin:20px 0;text-align:center}
.instruction-box{background:var(--sage-pale);border-radius:8px;padding:14px 20px;font-size:12.5px;font-style:italic;color:var(--sage);line-height:1.7;margin-bottom:20px}

/* ── TEXT INPUTS ─────────────────────────── */
.journal-input{
  width:100%;background:transparent;
  border:none;border-bottom:1px solid var(--sand);
  padding:10px 4px;font-family:'Playfair Display',serif;
  font-size:14px;color:var(--deep);outline:none;
  line-height:1.6;resize:none;
  transition:border-color .2s;display:block;
  min-height:44px;
}
.journal-input:focus{border-bottom-color:var(--terracotta)}
.journal-input::placeholder{color:var(--sand);font-style:italic}
.text-input-inline{
  border:none;border-bottom:1.5px solid var(--sand);
  font-family:'Playfair Display',serif;font-size:15px;
  color:var(--deep);outline:none;background:transparent;
  padding:2px 6px;width:100%;max-width:280px;
}
.text-input-inline:focus{border-bottom-color:var(--terracotta)}
.field-line{display:block;height:1px;background:var(--sand);margin:10px 0}

/* ── MOOD SELECTOR ───────────────────────── */
.mood-row{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 20px}
.mood-btn{
  display:flex;align-items:center;gap:7px;
  padding:7px 14px;border:1.5px solid var(--sand);
  background:white;cursor:pointer;border-radius:20px;
  font-family:'Lato',sans-serif;font-size:11.5px;color:var(--warm);
  transition:all .2s;user-select:none;
}
.mood-btn::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--sand);flex-shrink:0}
.mood-btn:hover{border-color:var(--terra-light);color:var(--terracotta)}
.mood-btn.selected{border-color:var(--terracotta);background:var(--terra-pale);color:var(--terracotta)}
.mood-btn[data-mood="running"]::before{background:#7B8EA0}
.mood-btn[data-mood="overwhelmed"]::before{background:#C27060}
.mood-btn[data-mood="managing"]::before{background:#C9B86E}
.mood-btn[data-mood="soft"]::before{background:#8DB5A8}
.mood-btn[data-mood="alive"]::before{background:#8BAE5E}
.mood-btn.selected::before{background:var(--terracotta)}

/* ── WORD CHIPS ──────────────────────────── */
.chip-group{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--parchment)}
.chip-group:last-child{border-bottom:none}
.chip-area-label{font-size:11.5px;font-weight:700;color:var(--terracotta);letter-spacing:.04em;margin-bottom:4px}
.chip-hint{font-size:10.5px;color:var(--mid);font-style:italic;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  padding:4px 11px;border:1px solid var(--sand);
  border-radius:14px;font-size:11px;color:var(--warm);
  cursor:pointer;background:white;transition:all .15s;
  user-select:none;
}
.chip:hover{border-color:var(--terracotta);color:var(--terracotta)}
.chip.selected{background:var(--terracotta);color:white;border-color:var(--terracotta)}

/* ── TWO-COLUMN ──────────────────────────── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:20px 0}
.col-wrap{background:var(--parchment);overflow:hidden}
.col-header{
  padding:10px 14px;
  font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:white;
}
.col-header.terra{background:var(--terracotta)}
.col-header.sage{background:var(--sage)}
.col-items{padding:10px 14px}
.bullet-row{display:flex;align-items:center;gap:7px;border-bottom:1px solid rgba(224,206,184,.5);padding:4px 0}
.bullet-dot{color:var(--terracotta);font-size:16px;flex-shrink:0;line-height:1}
.bullet-field{
  flex:1;border:none;background:transparent;
  font-family:'Lato',sans-serif;font-size:12px;
  color:var(--deep);outline:none;padding:3px 0;
}

/* ── PRACTICE TILES ──────────────────────── */
.practice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:18px 0}
.practice-tile{background:white;border:1px solid var(--parchment);overflow:hidden;position:relative}
.tile-head{
  padding:8px 12px;
  font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:white;background:var(--terracotta);
}
.tile-head.sage{background:var(--sage)}
.tile-inner{padding:12px}
.tile-title{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--terracotta);margin-bottom:6px;font-weight:600}
.tile-sub{font-size:11.5px;color:var(--terracotta);font-weight:700;margin-bottom:5px}
.tile-body{font-size:11px;line-height:1.65;color:var(--warm)}
.tile-body li{margin-left:12px;margin-bottom:2px}
.practice-done-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:10px;cursor:pointer;
  font-size:9.5px;color:var(--mid);text-transform:uppercase;
  letter-spacing:.08em;border:none;background:none;font-family:'Lato',sans-serif;
  padding:0;
}
.check-box{
  width:14px;height:14px;border:1.5px solid var(--sand);border-radius:3px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .2s;font-size:10px;color:white;
}
.practice-done-btn.done .check-box{background:var(--sage);border-color:var(--sage)}
.practice-done-btn.done{color:var(--sage)}

/* ── PERMISSION SLIP ─────────────────────── */
.permission-slip{border:1.5px dashed var(--sand);padding:28px 28px 24px;margin:20px 0}
.perm-name-row{font-family:'Playfair Display',serif;font-size:16px;color:var(--terracotta);margin-bottom:14px;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap}
.perm-name-input{
  border:none;border-bottom:1.5px solid var(--sand);
  font-family:'Playfair Display',serif;font-size:16px;color:var(--deep);
  flex:1;min-width:160px;outline:none;padding:0 4px;background:transparent;
}
.perm-name-input:focus{border-bottom-color:var(--terracotta)}
.perm-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--deep);margin-bottom:16px;font-weight:600}
.perm-list{list-style:none;margin-bottom:22px}
.perm-list li{
  font-family:'Playfair Display',serif;font-size:13.5px;font-style:italic;
  color:var(--warm);padding:6px 0 6px 18px;position:relative;
  border-bottom:1px solid var(--parchment);line-height:1.55;
}
.perm-list li::before{content:'•';color:var(--terracotta);position:absolute;left:0}
.sign-row{display:flex;gap:32px;flex-wrap:wrap}
.sign-field{display:flex;flex-direction:column;gap:4px}
.sign-label{font-size:11px;color:var(--mid);font-weight:400}
.sign-input{
  border:none;border-bottom:1.5px solid var(--sand);
  font-family:'Playfair Display',serif;font-size:15px;color:var(--terracotta);
  min-width:180px;outline:none;padding:2px 4px;background:transparent;
}
.sign-input:focus{border-bottom-color:var(--terracotta)}

/* ── RHYTHM BLOCKS ───────────────────────── */
.rhythm-block{margin-bottom:20px}
.rhythm-head{
  padding:10px 14px;
  font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:white;
  margin-bottom:0;
}
.rhythm-head.morning{background:var(--sage-light)}
.rhythm-head.afternoon{background:var(--terra-light)}
.rhythm-head.evening{background:var(--purple-soft)}
.rhythm-hint{font-size:12px;font-style:italic;color:var(--mid);padding:8px 14px;background:var(--parchment)}
.rhythm-ta{
  width:100%;background:var(--parchment);border:none;border-top:1px solid var(--sand);
  padding:10px 14px;font-family:'Playfair Display',serif;font-size:13.5px;
  color:var(--deep);resize:vertical;outline:none;min-height:70px;
}
.rhythm-ta:focus{outline:1px solid var(--terra-light)}

/* ── AFFIRMATION CARDS ───────────────────── */
.aff-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:20px 0}
.aff-card{
  background:var(--parchment);border:1.5px solid transparent;
  padding:14px 14px 14px 12px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:all .2s;user-select:none;
}
.aff-card:hover{border-color:var(--terra-light)}
.aff-card.picked{background:var(--terra-pale);border-color:var(--terracotta)}
.aff-num{font-family:'Playfair Display',serif;font-size:20px;color:var(--sand);flex-shrink:0;width:24px;font-weight:700;text-align:center}
.aff-card.picked .aff-num{color:var(--terra-light)}
.aff-txt{font-family:'Playfair Display',serif;font-size:12.5px;font-style:italic;color:var(--warm);line-height:1.5}
.aff-card.picked .aff-txt{color:var(--terracotta)}

/* ── DAY TRACKER ─────────────────────────── */
.day-tracker{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin:8px 0 24px}
.tracker-day{text-align:center}
.tracker-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:5px;font-weight:700}
.tracker-input{
  width:100%;border:none;border-bottom:1.5px solid var(--sand);
  background:transparent;font-family:'Playfair Display',serif;
  font-size:12px;color:var(--deep);outline:none;padding:4px 2px;text-align:center;
  font-style:italic;
}
.tracker-input:focus{border-bottom-color:var(--terracotta)}

/* ── DRAW REDIRECT ───────────────────────── */
.draw-card{
  background:var(--sage-pale);border:2px dashed var(--sage-light);
  padding:28px;text-align:center;margin:16px 0;
}
.draw-card-icon{font-size:36px;margin-bottom:10px}
.draw-card-title{font-family:'Playfair Display',serif;font-size:18px;font-style:italic;color:var(--sage);margin-bottom:7px;font-weight:600}
.draw-card-text{font-size:12.5px;color:var(--mid);line-height:1.65;max-width:380px;margin:0 auto}

/* ── LETTER PAGE ─────────────────────────── */
.lined-area{
  background:white;border:1px solid var(--parchment);
  padding:20px 24px;min-height:320px;
  background-image:repeating-linear-gradient(transparent,transparent 30px,var(--parchment) 30px,var(--parchment) 31px);
  background-size:100% 31px;background-position:0 30px;
}
.lined-ta{
  width:100%;min-height:320px;
  background:transparent;border:none;outline:none;
  font-family:'Playfair Display',serif;font-size:14px;
  color:var(--deep);line-height:31px;resize:none;
  padding:0;
}
.sign-block{margin-top:24px;display:flex;gap:40px;flex-wrap:wrap;align-items:flex-end}

/* ── FRIDGE PRINTABLES ───────────────────── */
.fridge-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:20px 0}
.fridge-card{border:2px dashed var(--sand);padding:20px;border-radius:6px}
.fridge-title{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--terracotta);font-weight:700;text-align:center;margin-bottom:14px}
.fridge-item{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--warm);padding:7px 0;border-bottom:1px solid var(--parchment);text-align:center;line-height:1.4}
.fridge-brand{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--terracotta);text-align:center;margin-top:14px}
.fridge-full{grid-column:1/-1}
.print-btn{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--terracotta);color:white;border:none;
  padding:12px 28px;font-family:'Lato',sans-serif;font-size:11px;
  letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
  margin-bottom:20px;transition:background .2s;
}
.print-btn:hover{background:var(--warm)}

/* ── COVER PAGE ──────────────────────────── */
.cover-page{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;padding:60px 44px;
  position:relative;overflow:hidden;
}
.cover-bg{
  position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 75% 25%,rgba(191,107,80,.11) 0%,transparent 55%),
    radial-gradient(ellipse at 25% 75%,rgba(91,139,128,.08) 0%,transparent 55%);
}
.cover-rainbow-top{position:absolute;top:0;left:0;right:0;height:4px;background:var(--rainbow)}
.cover-rainbow-bot{position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--rainbow)}
.cover-eyebrow{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--terracotta);margin-bottom:24px;font-weight:700}
.cover-tag{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--sage);margin-bottom:16px}
.cover-h1{font-family:'Playfair Display',serif;font-size:62px;font-weight:700;font-style:italic;color:var(--terracotta);line-height:1;margin-bottom:4px}
.cover-h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--warm);line-height:1.4;margin-bottom:24px}
.cover-divider{width:44px;height:2px;background:var(--rainbow);margin:0 0 24px}
.cover-desc{font-size:14px;line-height:1.8;color:var(--warm);max-width:440px;font-weight:300;margin-bottom:40px}
.cover-stats{display:flex;gap:36px;margin-bottom:40px}
.stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--terracotta)}
.stat-l{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--mid)}
.cover-cta{display:inline-flex;align-items:center;gap:10px;background:var(--deep);color:var(--parchment);border:none;padding:13px 30px;font-family:'Lato',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .3s}
.cover-cta:hover{background:var(--terracotta)}
.cover-author{margin-top:24px;font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--mid)}

/* ── PAGE NAV ────────────────────────────── */
.page-nav{display:flex;justify-content:space-between;align-items:center;margin-top:64px;padding-top:32px;border-top:1px solid var(--parchment)}
.nav-btn{display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;font-family:'Lato',sans-serif;font-size:10.5px;letter-spacing:.1em;color:var(--mid);transition:color .2s;text-transform:uppercase;padding:7px 0}
.nav-btn:hover:not([disabled]){color:var(--terracotta)}
.nav-btn[disabled]{opacity:.22;cursor:default}
.page-indicator{font-family:'Playfair Display',serif;font-size:12px;color:var(--sand);letter-spacing:.08em}

/* ── INNER LIGHT PAGE ────────────────────── */
.inner-light-page{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:60px 44px;text-align:center;
  position:relative;
}
.light-logo{margin-bottom:32px}
.light-triangle{width:120px;height:auto;display:block;margin:0 auto 24px}
.light-brand{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;letter-spacing:.12em;color:var(--deep);text-transform:uppercase;margin-bottom:4px}
.light-sub{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid)}
.light-quote{font-family:'Playfair Display',serif;font-size:26px;font-style:italic;font-weight:600;color:var(--terracotta);line-height:1.3;margin:28px 0 16px}
.light-body{font-family:'Playfair Display',serif;font-size:16px;font-style:italic;color:var(--warm);line-height:1.7;max-width:500px;margin:0 auto 32px}
.light-prompt{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--mid);margin-bottom:12px;text-align:left;display:block}

/* ── MOBILE ──────────────────────────────── */
.mobile-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;background:var(--deep);color:var(--parchment);border:none;width:38px;height:38px;cursor:pointer;font-size:18px;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(44,32,24,.5);z-index:90}

/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sand);border-radius:2px}

/* ── PRINT ───────────────────────────────── */
@media print{
  .sidebar,.mobile-toggle,.sidebar-overlay,.page-nav{display:none!important}
  .main{margin:0!important;overflow:visible!important}
  .workbook{height:auto!important;overflow:visible!important}
  body{background:white}
}

@media(max-width:800px){
  .mobile-toggle{display:flex}
  .sidebar{position:fixed;top:0;left:0;bottom:0;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}

<body>
<button class="mobile-toggle" id="mobile-toggle">☰</button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="workbook" id="app">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main" id="main-content">
    <div id="page-content"></div>
  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════

const AFFIRMATIONS = [
  'I am enough, exactly as I am right now.',
  'My feelings are not a problem to be solved.',
  'My creativity belongs to me alone.',
  'My body is worthy of my gratitude.',
  'Slowing down is not falling behind.',
  'I am allowed to rest without earning it first.',
  'I am doing something beautiful, even in the mess.',
  'I am learning, and that is enough.',
  'I am allowed to want something for myself.',
  'I give myself permission to begin again today.'
];

const BODY_CHIPS = [
  { key:'head',    label:'Head & mind',    hint:'Racing / foggy / heavy / still / buzzing', words:['Racing','Foggy','Heavy','Still','Buzzing'] },
  { key:'jaw',     label:'Jaw & shoulders', hint:'Clenched / tight / heavy / released / soft', words:['Clenched','Tight','Heavy','Released','Soft'] },
  { key:'chest',   label:'Chest & heart',  hint:'Constricted / open / tender / steady / hollow', words:['Constricted','Open','Tender','Steady','Hollow'] },
  { key:'stomach', label:'Stomach & gut',  hint:'Knotted / empty / warm / tight / fluttery', words:['Knotted','Empty','Warm','Tight','Fluttery'] },
  { key:'hands',   label:'Hands & arms',   hint:'Tense / restless / numb / tired / open', words:['Tense','Restless','Numb','Tired','Open'] },
  { key:'legs',    label:'Legs & feet',    hint:'Heavy / restless / grounded / unsteady / still', words:['Heavy','Restless','Grounded','Unsteady','Still'] },
];

const PRACTICES = [
  { key:'colour',   head:'Intuitive Colour Practice', sage:false, title:'What Colour Feels Like You Today?', sub:'', body:'Without overthinking, choose 1–3 colours that match how you feel emotionally today. You might scribble with them, paint with them, collect objects in those colours, wear them, or create a colour swatch page.<br><br><em>No explanation needed. Let colour speak before words do.</em>' },
  { key:'music',    head:'Music + Mark Making',        sage:false, title:'Song + Movement',                  sub:'', body:'Put on one calming song from today\'s playlist. For the length of the song: draw lines, shapes, textures, circles, patterns, movement — without trying to make anything "good."<br><br><em>The goal is not art. The goal is expression.</em>' },
  { key:'barefoot', head:'Barefoot Grounding Ritual',  sage:true,  title:'Touch the Earth',                  sub:'Step outside barefoot for 2–5 minutes.', body:'Feel: the temperature, the texture beneath you, the air on your skin, the weight of your body being held. Take one slower breath than usual.<br><br><em>"I am allowed to slow down too."</em>' },
  { key:'texture',  head:'Texture Collection Palette', sage:false, title:'Notice What Feels Beautiful',      sub:'', body:'Throughout the day, collect or photograph small textures that feel calming or alive to you: linen, leaves, tea steam, sunlight, chipped paint, fabric, shadows, messy paint palettes.' },
  { key:'fivemin',  head:'5 Minute Creative Ritual',   sage:false, title:'Tiny Counts',                      sub:'Set a timer for 5 minutes only.', body:'Doodling, collaging, journaling, arranging objects, tearing paper, colouring, sketching, moving colour across a page.<br><br><em>Stop when the timer ends. You are practising returning — not proving.</em>' },
  { key:'voice',    head:'Voice Note Reflection',       sage:true,  title:'Speak Instead of Write',           sub:'', body:'If writing feels exhausting today, open your phone and record a short voice note. You might answer: What am I feeling? What do I need? What felt alive in me today? What am I craving more of?<br><br><em>Let your voice exist without editing it.</em>' },
  { key:'perm',     head:'Creative Permission Practice',sage:false, title:'Make Something No One Will See',    sub:'', body:'Create something today that does not need posting, finishing, improving, or meaning. Just make. Quietly. Privately. For yourself.' },
  { key:'nervous',  head:'Nervous System Reset Moment', sage:true,  title:'Unclench',                         sub:'Pause here.', body:'Relax your jaw. Drop your shoulders. Uncross your hands. Soften your forehead. Take one slower breath.<br><br><em>Your body deserves gentleness too.</em>' },
  { key:'window',   head:'Window Light Practice',       sage:true,  title:'Notice the Quiet Beauty',          sub:'', body:'Pause near a window or somewhere natural light touches the room. Notice the shadows, the colours, the movement, the way light falls across ordinary things. Take a photo, sketch what you see, or simply sit with it for one full minute.' },
];

const NAV_ITEMS = [
  { label:'Cover',                      page:0,  section:'welcome' },
  { label:'Welcome',                    page:1,  section:'welcome' },
  { label:'Check-In',                   page:2,  section:'day01'   },
  { label:'Body Awareness Scan',        page:3,  section:'day01'   },
  { label:'Creative Self Portrait',     page:4,  section:'day02'   },
  { label:'What Lights Me Up',          page:5,  section:'day03'   },
  { label:'Your Inner Light',           page:6,  section:'light'   },
  { label:'My Permission Slip',         page:7,  section:'day04'   },
  { label:'My Gentle Daily Rhythm',     page:8,  section:'day04'   },
  { label:'Letting Go & Inviting In',   page:9,  section:'day05'   },
  { label:'Creative Practices',         page:10, section:'day06'   },
  { label:'Practice Reflection',        page:11, section:'day06'   },
  { label:'Coming Home',                page:12, section:'day07'   },
  { label:'Letter to Future Self',      page:13, section:'day07'   },
  { label:'Daily Affirmations',         page:14, section:'extras'  },
  { label:'Fridge Printables',          page:15, section:'extras'  },
];

const SIDEBAR_GROUPS = [
  { label:'Introduction',          filter:'welcome' },
  { label:'Day 01 · Nervous System',filter:'day01'  },
  { label:'Day 02 · Creativity',   filter:'day02'  },
  { label:'Day 03 · Creativity',   filter:'day03'  },
  { label:'Your Inner Light',      filter:'light'  },
  { label:'Day 04 · Permission',   filter:'day04'  },
  { label:'Day 05 · Release',      filter:'day05'  },
  { label:'Day 06 · Embodiment',   filter:'day06'  },
  { label:'Day 07 · Integration',  filter:'day07'  },
  { label:'Resources',             filter:'extras' },
];

const TOTAL = 15;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════

const state = {
  page: parseInt(localStorage.getItem('ilr2-page') || '0'),
  entries: JSON.parse(localStorage.getItem('ilr2-entries') || '{}'),
};

function save() {
  try {
    localStorage.setItem('ilr2-page', state.page);
    localStorage.setItem('ilr2-entries', JSON.stringify(state.entries));
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════════

function goTo(p) {
  p = Math.max(0, Math.min(TOTAL, p));
  state.page = p; save();
  render();
  document.getElementById('main-content').scrollTop = 0;
  closeSidebar();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════════

document.addEventListener('input', function(e) {
  const t = e.target;
  if (t.dataset.key) { state.entries[t.dataset.key] = t.value; save(); }
});

document.addEventListener('click', function(e) {
  if (e.target.closest('#mobile-toggle'))  { toggleSidebar(); return; }
  if (e.target.id === 'sidebar-overlay')   { closeSidebar(); return; }

  const nav = e.target.closest('[data-goto]');
  if (nav && !nav.disabled && !nav.hasAttribute('disabled')) { goTo(parseInt(nav.dataset.goto)); return; }

  const moodBtn = e.target.closest('[data-mood]');
  if (moodBtn) {
    state.entries['mood'] = moodBtn.dataset.mood; save();
    document.querySelectorAll('[data-mood]').forEach(b => b.classList.toggle('selected', b.dataset.mood === moodBtn.dataset.mood));
    return;
  }

  const chip = e.target.closest('[data-word]');
  if (chip) {
    const group = chip.closest('[data-chip-group]');
    if (!group) return;
    const cat = group.dataset.chipGroup;
    const key = 'chip-' + cat;
    const word = chip.dataset.word;
    let sel = JSON.parse(state.entries[key] || '[]');
    const idx = sel.indexOf(word);
    if (idx === -1) sel.push(word); else sel.splice(idx, 1);
    state.entries[key] = JSON.stringify(sel); save();
    chip.classList.toggle('selected', idx === -1);
    return;
  }

  const pracBtn = e.target.closest('[data-practice]');
  if (pracBtn) {
    const key = 'prac-' + pracBtn.dataset.practice;
    state.entries[key] = state.entries[key] === '1' ? '' : '1'; save();
    pracBtn.classList.toggle('done', state.entries[key] === '1');
    pracBtn.querySelector('.check-box').textContent = state.entries[key] === '1' ? '✓' : '';
    return;
  }

  const affCard = e.target.closest('[data-aff]');
  if (affCard) {
    const num = affCard.dataset.aff;
    state.entries['aff-picked'] = state.entries['aff-picked'] === num ? '' : num; save();
    document.querySelectorAll('[data-aff]').forEach(c => c.classList.toggle('picked', c.dataset.aff === state.entries['aff-picked']));
    return;
  }

  if (e.target.id === 'print-btn') { window.print(); return; }
});

// ═══════════════════════════════════════════════════════════
//  RESTORE
// ═══════════════════════════════════════════════════════════

function restoreAll() {
  // textareas / inputs
  document.querySelectorAll('[data-key]').forEach(el => { el.value = state.entries[el.dataset.key] || ''; });
  // mood
  if (state.entries['mood']) {
    document.querySelectorAll('[data-mood]').forEach(b => b.classList.toggle('selected', b.dataset.mood === state.entries['mood']));
  }
  // chips
  document.querySelectorAll('[data-word]').forEach(chip => {
    const group = chip.closest('[data-chip-group]');
    if (!group) return;
    const sel = JSON.parse(state.entries['chip-' + group.dataset.chipGroup] || '[]');
    chip.classList.toggle('selected', sel.includes(chip.dataset.word));
  });
  // practices
  document.querySelectorAll('[data-practice]').forEach(btn => {
    const done = state.entries['prac-' + btn.dataset.practice] === '1';
    btn.classList.toggle('done', done);
    btn.querySelector('.check-box').textContent = done ? '✓' : '';
  });
  // affirmations
  if (state.entries['aff-picked']) {
    document.querySelectorAll('[data-aff]').forEach(c => c.classList.toggle('picked', c.dataset.aff === state.entries['aff-picked']));
  }
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════

function render() {
  document.getElementById('sidebar').innerHTML = buildSidebar();
  document.getElementById('page-content').innerHTML = buildCurrentPage();
  restoreAll();
}

function buildSidebar() {
  const pct = Math.round((state.page / TOTAL) * 100);
  let nav = '';
  SIDEBAR_GROUPS.forEach(g => {
    nav += `<div class="nav-group-label">${g.label}</div>`;
    NAV_ITEMS.filter(n => n.section === g.filter).forEach(item => {
      const active = state.page === item.page ? ' active' : '';
      nav += `<div class="nav-item${active}" data-goto="${item.page}"><div class="nav-dot"></div>${item.label}</div>`;
    });
  });
  return `
    <div class="sidebar-brand">
      <h1>Inner Light<br>Reset</h1>
      <p>by Melissa Vermaak</p>
      <div class="rainbow-mini"></div>
    </div>
    <nav class="sidebar-nav">${nav}</nav>
    <div class="sidebar-progress">
      <div class="progress-label">Journey · ${pct}%</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
}

function buildPageNav(p) {
  const pd = p === 0 ? 'disabled' : '';
  const nd = p === TOTAL ? 'disabled' : '';
  return `<div class="page-nav">
    <button class="nav-btn" data-goto="${p-1}" ${pd}>← Previous</button>
    <div class="page-indicator">${p+1} / ${TOTAL+1}</div>
    <button class="nav-btn" data-goto="${p+1}" ${nd}>Next →</button>
  </div>`;
}

function ta(key, placeholder, rows) {
  return `<textarea class="journal-input" data-key="${key}" placeholder="${placeholder || 'Write here…'}" rows="${rows||3}" style="min-height:${(rows||3)*26}px"></textarea>`;
}

function buildCurrentPage() {
  switch(state.page) {
    case  0: return buildCoverPage();
    case  1: return buildWelcomePage();
    case  2: return buildCheckinPage();
    case  3: return buildBodyScanPage();
    case  4: return buildSelfPortraitPage();
    case  5: return buildLightsMeUpPage();
    case  6: return buildInnerLightPage();
    case  7: return buildPermissionPage();
    case  8: return buildRhythmPage();
    case  9: return buildLettingGoPage();
    case 10: return buildPracticesPage();
    case 11: return buildReflectionPage();
    case 12: return buildComingHomePage();
    case 13: return buildLetterPage();
    case 14: return buildAffirmationsPage();
    case 15: return buildFridgePage();
    default: return '';
  }
}

// ═══════════════════════════════════════════════════════════
//  PAGE BUILDERS
// ═══════════════════════════════════════════════════════════

function buildCoverPage() {
  return `<div class="cover-page">
    <div class="cover-bg"></div>
    <div class="cover-rainbow-top"></div>
    <div class="cover-rainbow-bot"></div>
    <div style="position:relative;z-index:1;max-width:520px">
      <div class="cover-eyebrow">Inner Light Studio · Melissa Vermaak</div>

  const contents = [
    ['01','The Gentle Check-In'],['02','Body Awareness Scan'],['03','Creative Self Portrait'],
    ['04','What Lights Me Up'],['05','Your Inner Light'],['06','Releasing the Weight'],

function buildCheckinPage() {
  const moods = [
    ['running','Running on empty'],['overwhelmed','Overwhelmed'],

  ];
  return `<div class="page">

  return `<div class="page">

function buildLightsMeUpPage() {
  const leftItems = Array.from({length:10},(_,i) => `<div class="bullet-row"><span class="bullet-dot">·</span><input class="bullet-field" data-key="lights-used-${i}" placeholder=" " /></div>`).join('');

function buildPermissionPage() {
  return `<div class="page">
    <div class="page-header">

      <div class="rainbow-bar"></div>
    </div>
    <p class="body-text">You've just spent two days doing something most mothers never do. You checked in with yourself — honestly, without performance. You turned toward your body — the jaw that has been clenching, the shoulders that have been carrying, the chest that has been quietly waiting for someone to notice it was tight. That was not a small thing.</p>
    <p class="body-text">What you found there — the exhaustion, the tension, the emotion sitting just beneath the surface — that is information. Your body has been holding all of it, loyally and without complaint, because somewhere along the way you learned that it wasn't quite safe to put it down.</p>
    <p class="body-text">The permission slip isn't a task to complete. It is simply a way of making visible something your nervous system has been waiting to hear. <strong>You were just waiting for someone to say so. So here it is, in writing, from you to you: You have permission.</strong></p>
    <div class="permission-slip">
      <div class="perm-name-row">
        I, <input class="perm-name-input" data-key="perm-name" placeholder="your name"> ,
      </div>
      <div class="perm-title">hereby give myself full permission to:</div>
      <ul class="perm-list">
        <li>Rest without guilt, even when the to-do list is unfinished.</li>
        <li>Say no — to people, plans, and things that drain me.</li>
        <li>Feel my feelings, even the inconvenient, ugly, or confusing ones.</li>
        <li>Create imperfectly, without needing a finished product.</li>
        <li>Take up space, have needs, and ask for help.</li>
        <li>Change my mind, my plans, and my pace.</li>
        <li>Begin again — today, tomorrow, and as many times as I need. Be a work in progress, and enough, all at once.</li>

    </div>
    <div class="quote-box">"You are not too much. You are not a burden. You are a mother who is learning to mother herself too."</div>
    ${buildPageNav(7)}
  </div>`;
}
